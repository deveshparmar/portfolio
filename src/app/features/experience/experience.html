<section class="section container experience" [@listAnim]>

  <h2 class="title">Experience Journey</h2>

  <div class="timeline">

    <!-- LINE -->
    <div class="line"></div>

    <!-- ITEMS -->
    <div class="item" *ngFor="let exp of experiences$ | async; let first = first">
      <div class="dot" [class.current]="exp.isCurrent"></div>

      <div class="card">
        <div class="header">
          <div>
            <h3>{{exp.role}}</h3>
            <span class="company">{{exp.company}}</span>
          </div>
          <span class="badge" *ngIf="exp.isCurrent">Current</span>
        </div>

        <p class="meta">{{exp.duration}} • {{exp.location}}</p>

        <ul>
          <li *ngFor="let high of exp.highlights">
            {{high.text}}
            <span class="impact" *ngIf="high.impact">{{high.impact}}</span>
          </li>
        </ul>

        <!-- TECH CHIPS -->
        <div class="chips">
          <span *ngFor="let tool of exp.tech">{{tool}}</span>
        </div>
      </div>
    </div>

  </div>
</section>
