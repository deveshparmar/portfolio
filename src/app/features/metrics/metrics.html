<section class="section container">
  <h2 class="neon">Live System Metrics</h2>

  <div class="grid">
    <div class="card glass" appFade>
      <h3>Kafka Throughput</h3>
      <p>{{kafka}} req/min</p>
    </div>

    <div class="card glass" appFade>
      <h3>Redis Hit Rate</h3>
      <p>{{redis | number:'1.0-2'}}%</p>
    </div>

    <div class="card glass" appFade>
      <h3>Latency</h3>
      <p>{{latency | number:'1.0-0'}} ms</p>
    </div>
  </div>
</section>
