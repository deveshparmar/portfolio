<section id="projects" class="section container projects">

  <h2 class="title">Projects</h2>

  <div class="scroll">

    @for(p of projects$ | async;  track $index){
    <div class="card">

      <!-- HEADER -->
      <div class="top">
        <div class="{{p.icon}}"></div>
        <span class="duration">{{p.duration}}</span>
      </div>

      <h3>{{p.title}}</h3>

      <p class="desc">{{p.desc}}</p>

      <!-- HIGHLIGHTS -->
      <ul>
        @for(h of p.highlights; track $index){
          <li>▹ {{h}}</li>
        }
      </ul>

      <!-- TECH -->
      <div class="chips">
        @for(t of p.tech; track $index){
          <span>{{t}}</span>
        }
      </div>

    </div>
  }

  </div>

</section>
