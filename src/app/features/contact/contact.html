<section id="contact" class="section container contact">

  <h2 class="title">Get In Touch</h2>

  <p class="desc">
    I'm currently open to new opportunities and interesting projects.
    Whether you have a question about backend systems, want to discuss
    distributed architectures, or just want to say hi, feel free to reach out!
  </p>

  <div class="layout">
    <!-- FULL WIDTH FORM -->
    <div class="form-card">
      <h3>Drop a Message</h3>
      <input type="text" placeholder="Your Name" [(ngModel)]="form.name" />
      <input type="email" placeholder="Your Email" [(ngModel)]="form.email" />
      <textarea rows="5" placeholder="Your Message" [(ngModel)]="form.message"></textarea>
      <button (click)="submit()" [disabled]="loading">
        {{ loading ? 'Sending...' : 'Send Message' }}
      </button>
    </div>
  </div>

</section>
